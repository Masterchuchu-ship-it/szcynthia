<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Reaction Portrait</title>
    <link id="app-stylesheet" rel="stylesheet" href="./styles.css?v=svg-cropped-smaller" />
  </head>
  <body>
    <main class="app-shell">
      <section class="preview-panel" aria-label="Music reactive portrait preview">
        <canvas id="visualizer" aria-hidden="true"></canvas>
        <div class="controls">
          <div class="button-group">
            <button id="mic-toggle" type="button">Mic input</button>
            <button id="share-toggle" type="button">Tab audio</button>
            <button id="stop-audio" type="button" disabled>Stop</button>
          </div>
          <p id="status">Choose an audio source to start the reaction</p>
        </div>
      </section>
    </main>
    <script>
      const version = new URLSearchParams(window.location.search).get("v") || "svg-cropped-smaller";
      document.getElementById("app-stylesheet").href = `./styles.css?v=${encodeURIComponent(version)}`;
      const script = document.createElement("script");
      script.src = `./app.js?v=${encodeURIComponent(version)}`;
      document.body.appendChild(script);
    </script>
  </body>
</html>
